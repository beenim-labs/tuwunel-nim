name: ci

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      TUWUNEL_NIM_DISABLE_RUST_DELEGATE: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: '2.3.1'
      - name: Sync parity artifacts
        run: nimble parity_sync
      - name: Ensure generated artifacts are committed
        run: git diff --exit-code
      - name: Syntax hygiene
        run: nimble syntax_hygiene
      - name: Build
        run: nimble build
      - name: Test
        run: nimble test

  verify-rocksdb:
    runs-on: ubuntu-latest
    env:
      TUWUNEL_NIM_DISABLE_RUST_DELEGATE: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: '2.3.1'
      - name: Install RocksDB Nim package
        run: |
          cd /tmp
          nimble install -y rocksdb
      - name: Run RocksDB-enabled tests
        run: bash tools/run_rocksdb_tests.sh
